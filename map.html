<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>サクラの被害マップ｜クビアカツヤカミキリ対策室</title>

<!-- ════════════════════════════════════════════════════════════
     ★設定エリア★  ここだけ書き換えてください
     入力ページ・管理ページと同じGASウェブアプリURLを貼ります。
     ※このページは「閲覧専用」です。合言葉なしでアクセスするため、
       GASは連絡先を返しません（個人情報は表示されません）。
════════════════════════════════════════════════════════════ -->
<script>
  const GAS_URL = "https://script.google.com/macros/s/AKfycbzinuU7Um6F9nOv0eOigQ2jRB2D6ToalNbZ0G1SiY3ngHX4q3hu10FjLWBVz5vPTkq7-Q/exec";   // ← GASのウェブアプリURLを貼る
</script>

<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Zen+Maru+Gothic:wght@500;700&family=Zen+Kaku+Gothic+New:wght@400;500;700&display=swap" rel="stylesheet">

<style>
  :root{
    --ink:#26201c; --ink-soft:#6f635b; --bg:#f5f1ec; --card:#ffffff;
    --line:#e3d9cf; --bark:#6b4f3a; --accent:#5d7d59;
    --c-mikakunin:#d9483b; --c-yotei:#e8a13a; --c-youtaiou:#e8742f;
    --c-shiro:#9aa0a6; --c-kanryo:#5d7d59;
  }
  *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
  body{font-family:'Zen Kaku Gothic New',sans-serif;color:var(--ink);background:var(--bg);
    line-height:1.7;font-size:15px;}

  header{background:var(--accent);color:#fff;padding:13px 16px;display:flex;align-items:center;gap:10px;
    position:sticky;top:0;z-index:30;}
  header .title{font-family:'Zen Maru Gothic',sans-serif;font-weight:700;font-size:16px;}
  header .reload{margin-left:auto;background:rgba(255,255,255,.2);border:none;color:#fff;
    border-radius:9px;padding:8px 13px;font-size:13px;font-family:inherit;cursor:pointer;font-weight:700;}

  .intro{background:#eef3ec;color:var(--ink-soft);font-size:12.5px;padding:8px 16px;text-align:center;}

  .tabs{display:flex;background:var(--card);border-bottom:1px solid var(--line);position:sticky;top:48px;z-index:29;}
  .tab{flex:1;text-align:center;padding:12px;font-weight:700;font-size:14px;color:var(--ink-soft);
    cursor:pointer;border-bottom:3px solid transparent;}
  .tab.on{color:var(--accent);border-bottom-color:var(--accent);}

  #map{width:100%;height:calc(100vh - 230px);min-height:320px;background:#dfe6e3;}
  .map-msg{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;
    text-align:center;color:var(--ink-soft);font-size:14px;padding:30px;z-index:5;}
  .legend{background:var(--card);padding:10px 14px;display:flex;flex-wrap:wrap;gap:10px 16px;
    border-top:1px solid var(--line);font-size:12.5px;}
  .legend-note{flex-basis:100%;font-size:11.5px;color:var(--ink-soft);margin-top:2px;line-height:1.6;}
  .legend span{display:flex;align-items:center;gap:5px;}
  .dot{width:13px;height:13px;border-radius:50%;display:inline-block;}
  .ring{width:14px;height:14px;border-radius:50%;border:2px dashed var(--c-mikakunin);
    background:rgba(217,72,59,.15);box-sizing:border-box;display:inline-block;}
  .blurdot{width:14px;height:14px;border-radius:50%;border:2px dashed #8a6d3b;
    background:rgba(138,109,59,.12);box-sizing:border-box;display:inline-block;}

  .list-view{display:none;padding:14px;}
  .list-view.on{display:block;}
  .summary{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:14px;}
  .sumcard{flex:1;min-width:90px;background:var(--card);border:1px solid var(--line);border-radius:12px;
    padding:12px;text-align:center;}
  .sumcard .n{font-family:'Zen Maru Gothic',sans-serif;font-size:22px;font-weight:700;}
  .sumcard .l{font-size:12px;color:var(--ink-soft);}
  .rep{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:14px;margin-bottom:12px;
    border-left:5px solid var(--line);}
  .rep .top{display:flex;align-items:center;gap:8px;margin-bottom:8px;}
  .rep .stat{font-size:12px;font-weight:700;color:#fff;padding:2px 10px;border-radius:999px;}
  .rep .when{font-size:12px;color:var(--ink-soft);margin-left:auto;}
  .rep .info{font-size:13.5px;color:var(--ink-soft);margin-bottom:4px;}
  .rep .info b{color:var(--ink);}
  .rep .photos{display:flex;gap:6px;margin-top:8px;flex-wrap:wrap;}
  .rep .photos a{width:64px;height:64px;border-radius:8px;overflow:hidden;background:#eee;display:block;}
  .rep .photos img{width:100%;height:100%;object-fit:cover;}

  .loading{text-align:center;padding:40px;color:var(--ink-soft);}
  .leaflet-popup-content{font-family:'Zen Kaku Gothic New',sans-serif;font-size:13px;}
</style>
</head>
<body>

<header>
  <span class="title">🌸 サクラの被害マップ</span>
  <button class="reload" id="reloadBtn">↻ 更新</button>
</header>
<div class="intro">クビアカツヤカミキリ対策室｜市民からの報告状況（閲覧用）</div>

<div class="tabs">
  <div class="tab on" data-tab="map">地図</div>
  <div class="tab" data-tab="list">一覧</div>
</div>

<div id="mapWrap">
  <div style="position:relative;">
    <div id="map"></div>
    <div class="map-msg" id="mapMsg" style="display:none;"></div>
  </div>
  <div class="legend">
    <span><i class="dot" style="background:var(--c-mikakunin)"></i>未確認</span>
    <span><i class="dot" style="background:var(--c-yotei)"></i>確認予定</span>
    <span><i class="dot" style="background:var(--c-youtaiou)"></i>要対応</span>
    <span><i class="dot" style="background:var(--c-shiro)"></i>該当なし</span>
    <span><i class="dot" style="background:var(--c-kanryo)"></i>対応済</span>
    <span><i class="ring"></i>要注意区域（半径3km）</span>
    <span><i class="blurdot"></i>おおまかな表示（場所を伏せた報告）</span>
    <div class="legend-note">丸印は市民からの報告地点で、色は対応の進み具合を表します。<br>
      未確認＝まだ現地を見ていない／確認予定＝確認に行く予定／要対応＝被害を確認、対応が必要／該当なし＝確認したがクビアカではなかった／対応済＝駆除などの対応が完了。<br>
      赤い破線の円は、被害が確認された地点から半径3kmの要注意エリアです。茶色の円は、場所を伏せた報告のおおまかな位置です。</div>
  </div>
</div>

<div class="list-view" id="listWrap">
  <div class="summary" id="summary"></div>
  <div id="listBody"><div class="loading">読み込み中…</div></div>
</div>

<script>
const STATUS_COLOR = {
  '未確認':'#d9483b','確認予定':'#e8a13a','要対応':'#e8742f','シロ':'#9aa0a6','完了':'#5d7d59'
};
// 外部向けに表示名を変える（内部用語をやわらげる）
const STATUS_LABEL = {
  '未確認':'未確認','確認予定':'確認予定','要対応':'要対応','シロ':'該当なし','完了':'対応済'
};
// 要注意区域の設定（管理ページと統一）──────────────
const CAUTION_RADIUS_M = 3000;             // 半径（メートル）＝3km
const CONFIRMED_STATUS = ['要対応','完了']; // 「発生確認」とみなす状態。ここを編集すれば対象を変更できる
// ───────────────────────────────────────────
let REPORTS = [];
let map = null, markers = [];

/* ===== データ取得（合言葉なし＝連絡先は返らない） ===== */
function loadReports(cb){
  if(!GAS_URL){ REPORTS = demoData(); if(cb) cb(true); return; }
  fetch(GAS_URL + '?action=list')
    .then(function(r){ return r.json(); })
    .then(function(d){
      if(d.result==='ok'){ REPORTS = d.reports || []; if(cb) cb(true); }
      else { if(cb) cb(false); }
    })
    .catch(function(){ if(cb) cb(false); });
}

/* ===== 地図 ===== */
function initMap(){
  const msg = document.getElementById('mapMsg');
  if(typeof L === 'undefined'){
    msg.style.display='flex';
    msg.innerHTML='地図を読み込めませんでした。<br>「一覧」タブはご利用いただけます。';
    return;
  }
  try{
    map = L.map('map').setView([35.52, 139.55], 11);
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',
      {attribution:'© OpenStreetMap', maxZoom:19}).addTo(map);
    // 縮尺バー（ズームに連動してkm/mが切り替わる・メートル法のみ）
    L.control.scale({position:'bottomleft', metric:true, imperial:false, maxWidth:120}).addTo(map);
    setTimeout(function(){ if(map) map.invalidateSize(); }, 200);
  }catch(err){
    map = null; msg.style.display='flex';
    msg.innerHTML='地図を表示できませんでした。<br>「一覧」タブはご利用いただけます。';
  }
}
/* ぼかし表示：報告IDから毎回同じズレを計算（特定されにくく、表示は安定） */
function hashStr(s){ let h=0; s=String(s||''); for(let i=0;i<s.length;i++){ h=(h*31 + s.charCodeAt(i))|0; } return h; }
function blurOffset(rep){
  const h=hashStr(rep.id);
  const ang=(Math.abs(h)%360)*Math.PI/180;
  const dist=300 + (Math.abs(Math.floor(h/360))%300); // 300〜600m
  const dLat=(dist*Math.cos(ang))/111000;
  const dLng=(dist*Math.sin(ang))/(111000*Math.cos(rep.lat*Math.PI/180));
  return [rep.lat+dLat, rep.lng+dLng];
}

function drawMarkers(){
  if(!map) return;
  markers.forEach(function(m){ map.removeLayer(m); });
  markers = [];
  let bounds = null;
  function extend(b){ if(!bounds){ bounds = L.latLngBounds(b); } else { bounds.extend(b); } }

  REPORTS.forEach(function(rep){
    if(!rep.lat || !rep.lng) return;
    const blur = (rep.publicScope === 'ぼかす');
    const pos = blur ? blurOffset(rep) : [rep.lat, rep.lng];
    const confirmed = CONFIRMED_STATUS.indexOf(rep.status) >= 0;

    // 要注意区域（半径3km）。ぼかし報告はズレた中心に表示
    if(confirmed){
      const zone = L.circle(pos, {
        radius: CAUTION_RADIUS_M, color:'#d9483b', weight:2.5, dashArray:'6 5',
        fillColor:'#d9483b', fillOpacity:.15, interactive:false
      }).addTo(map);
      markers.push(zone);
      extend(zone.getBounds());
    }

    if(blur){
      // 正確な点は出さず、大まかな円で表示
      const area = L.circle(pos, {
        radius:500, color:'#8a6d3b', weight:2, dashArray:'4 4',
        fillColor:'#8a6d3b', fillOpacity:.12
      }).addTo(map);
      area.bindPopup('<b>'+(STATUS_LABEL[rep.status]||rep.status)+'</b> '+(rep.tree||'')
        +'<br>このあたり（正確な場所は非公開）');
      markers.push(area);
      extend(pos);
    }else{
      const color = STATUS_COLOR[rep.status] || '#999';
      const mk = L.circleMarker(pos, {
        radius:9, fillColor:color, color:'#fff', weight:2, fillOpacity:.9
      }).addTo(map);
      const acc = rep.locMethod==='地名変換' ? '（おおよその位置）'
                : rep.locMethod==='手入力のみ' ? '（位置はおおよそ）' : '';
      mk.bindPopup('<b>'+(STATUS_LABEL[rep.status]||rep.status)+'</b> '+(rep.tree||'')+'<br>'
        +(rep.placeText? rep.placeText+'<br>':'')+acc);
      markers.push(mk);
      extend(pos);
    }
  });

  if(bounds && bounds.isValid()){ map.fitBounds(bounds, {padding:[40,40], maxZoom:15}); }
}

/* ===== 一覧・集計 ===== */
function render(){
  if(map) drawMarkers();
  renderSummary();
  renderList();
}
function renderSummary(){
  const total = REPORTS.length;
  const youtaiou = REPORTS.filter(function(r){return r.status==='要対応';}).length;
  const kanryo = REPORTS.filter(function(r){return r.status==='完了';}).length;
  document.getElementById('summary').innerHTML =
     '<div class="sumcard"><div class="n">'+total+'</div><div class="l">報告総数</div></div>'
    +'<div class="sumcard"><div class="n" style="color:#e8742f">'+youtaiou+'</div><div class="l">要対応</div></div>'
    +'<div class="sumcard"><div class="n" style="color:#5d7d59">'+kanryo+'</div><div class="l">対応済</div></div>';
}
function renderList(){
  const body = document.getElementById('listBody');
  const items = REPORTS.slice().reverse();
  if(!items.length){ body.innerHTML='<div class="loading">報告はまだありません</div>'; return; }
  body.innerHTML = items.map(function(r){
    const color = STATUS_COLOR[r.status]||'#999';
    let photos='';
    (r.photos||[]).forEach(function(u){
      photos += '<a href="'+u+'" target="_blank"><img src="'+driveThumb(u)+'" alt=""></a>';
    });
    const loc = r.placeText ? r.placeText : (r.lat ? '地図に表示' : '場所おおよそ');
    return ''
    +'<div class="rep" style="border-left-color:'+color+'">'
    +'  <div class="top"><span class="stat" style="background:'+color+'">'+(STATUS_LABEL[r.status]||r.status)+'</span>'
    +'    <span class="when">'+fmt(r.datetime)+'</span></div>'
    +'  <div class="info">📍 <b>'+esc(loc)+'</b></div>'
    +'  <div class="info">🌳 '+esc(r.tree||'種類不明')+'　フラス：'+esc(r.frass||'未回答')+'　ヤニ：'+esc(r.yani||'未回答')+'</div>'
    +'  <div class="photos">'+photos+'</div>'
    +'</div>';
  }).join('');
}

/* ===== タブ・更新 ===== */
document.querySelectorAll('.tab').forEach(function(t){
  t.addEventListener('click', function(){
    document.querySelectorAll('.tab').forEach(function(x){ x.classList.remove('on'); });
    t.classList.add('on');
    const tab=t.dataset.tab;
    document.getElementById('mapWrap').style.display = tab==='map'?'block':'none';
    document.getElementById('listWrap').classList.toggle('on', tab==='list');
    if(tab==='map' && map){ setTimeout(function(){ map.invalidateSize(); drawMarkers(); },100); }
  });
});
document.getElementById('reloadBtn').addEventListener('click', function(){
  document.getElementById('reloadBtn').textContent='↻ …';
  loadReports(function(ok){
    document.getElementById('reloadBtn').textContent='↻ 更新';
    if(ok) render(); else alert('更新できませんでした');
  });
});

/* ===== ユーティリティ ===== */
function esc(s){ return String(s==null?'':s).replace(/[&<>"]/g,function(c){
  return {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]; }); }
function fmt(s){ return String(s||'').replace('T',' ').slice(0,16); }
function driveThumb(url){
  const m = String(url).match(/[-\w]{25,}/);
  return m ? 'https://drive.google.com/thumbnail?id='+m[0]+'&sz=w200' : url;
}

/* ===== デモデータ（連絡先は含めない＝閲覧仕様の再現） ===== */
function demoData(){
  return [
    {id:'R-d1',datetime:'2026-05-30 10:12',lat:35.575,lng:139.575,photos:[],
     frass:'はい',tree:'サクラ',status:'要対応',locMethod:'GPS',placeText:'宮前区○○公園',publicScope:'公開'},
    {id:'R-d2',datetime:'2026-05-29 16:40',lat:35.44,lng:139.62,photos:[],
     frass:'わからない',tree:'わからない',status:'確認予定',locMethod:'地名変換',placeText:'横浜市○○区××',publicScope:'公開'},
    {id:'R-d3',datetime:'2026-05-25 09:05',lat:35.36,lng:139.48,photos:[],
     frass:'いいえ',tree:'ウメ',status:'完了',locMethod:'GPS',placeText:'藤沢市△△',publicScope:'ぼかす'}
  ];
}

/* ===== 起動 ===== */
loadReports(function(ok){
  initMap();
  if(ok) render();
  else document.getElementById('listBody').innerHTML='<div class="loading">読み込めませんでした。時間をおいて「↻更新」をお試しください。</div>';
});
</script>
</body>
</html>
